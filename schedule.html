<section id="schedule" class="section">
    <div class="schedule-wrap">
        <div class="container">
            <div class="schedule-header">
                <div>
                    <h1>JADWAL LAPANGAN</h1>
                    <p style="color:rgba(255,255,255,0.55);font-size:14px;margin-top:4px;">Klik slot tersedia untuk

                <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">

                    <div class="schedule-loading">⏳ Memuat jadwal...</div>
                </div>
            </div>

            <div class="legend">

                    <div class="legend-dot"
                        style="background:rgba(19,201,142,0.3);border:1.5px solid rgba(19,201,142,0.6);"></div>Tersedia

                <div class="legend-item">
                    <div class="legend-dot"

                </div>
                <div class="legend-item">
                    <div class="legend-dot"
                        style="background:rgba(255,165,0,0.2);border:1.5px solid rgba(255,165,0,0.5);"></div>Booking
                    Saya
                </div>
            </div>
        </div>
    </div>
    <footer>Dibuat oleh tim <strong>MoSe</strong> · Sewa Lapangan Badminton, Semudah Itu.</footer>
